  #     - dbeaver_data:/opt/dbeaver/workspace
  #     - dbeaver_logs:/opt/dbeaver/logs
volumes:
  postgres_data:
  metastore_logs:
  airflow_db:
  dremio_data:
  dbeaver_data:
  dbeaver_logs:
  openmetadata_mysql_data:
  openmetadata_elasticsearch_data:
  openmetadata_data:
  nexus_data:
  jenkins_data:
  

networks:
  hive-networking:
    name: hive-networking
