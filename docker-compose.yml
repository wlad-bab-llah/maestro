x-airflow-env: &airflow-env
  AIRFLOW__WEBSERVER__SECRET_KEY: adminadmin
  AIRFLOW__CORE__EXECUTOR: LocalExecutor
  AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
  AIRFLOW__CORE__LOAD_EXAMPLES: "false"
  AIRFLOW__CORE__HIDE_SENSITIVE_VAR_CONN_FIELDS: "True"
  AIRFLOW__CORE__SENSITIVE_VAR_CONN_NAMES: "MINIO_CONFIG"


services:

  spark-master:
    build: ./spark
    container_name: spark-master
    environment:
      - SPARK_MODE=master
      - SPARK_MASTER_HOST=spark-master
      - SPARK_MASTER_PORT=7077
      - SPARK_MASTER_WEBUI_PORT=8080
    volumes:
      - ./spark/apps:/opt/spark/work-dir
      - ./spark/jars:/jars
    networks:
      - hive-networking
    command: tail -f /dev/null

  hms-postgres:
    # Pin to a specific newer Postgres major version for reproducible upgrades
    # If you have existing data in the named volume, a proper pg_upgrade or dump/restore
    # is required before changing major versions. See notes below.
    image: postgres:15
    container_name: hms-postgres
    environment:
      POSTGRES_DB: metastore
      POSTGRES_USER: hive
      POSTGRES_PASSWORD: changeme
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - hive-networking
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hive"]
      interval: 10s
      retries: 5
    restart: unless-stopped

  hivemetastore:
    container_name: hivemetastore
    build:
      context: .
      dockerfile: docker/Dockerfile
    depends_on:
      hms-postgres:
        condition: service_healthy
    environment:
      DB_HOST: hms-postgres
      DB_PORT: 5432
      DB_NAME: metastore
      DB_USER: hive
      DB_PASSWORD: changeme
      HIVE_METASTORE_PORT: 9083
    ports:
      - "9083:9083"
    volumes:
      - metastore_logs:/opt/hivemetastore/logs
    networks:
      hive-networking:
        aliases:
          - hivemetastore
    restart: unless-stopped

  minio:
    image: minio/minio
    container_name: minio
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=password
    networks:
      hive-networking:
        aliases:
          - warehouse.minio
    volumes:
      - ./warehouse:/data
    ports:
      - 9001:9001
      - 9000:9000
    command: ["server", "/data", "--console-address", ":9001"]

  airflow-postgres:
    # Use a newer Postgres version for Airflow DB. If upgrading from an existing
    # Postgres 13 data directory, run pg_upgrade or perform dump/restore to migrate data.
    image: postgres:15
    container_name: airflow-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow_db:/var/lib/postgresql/data
    networks:
      - hive-networking

  airflow-init:
    build: 
      context: ./airflow
      dockerfile: Dockerfile
    container_name: airflow-init
    depends_on:
      - airflow-postgres
    environment:
      <<: *airflow-env
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/maestro:/opt/airflow/maestro
      - ./airflow/apps:/opt/airflow/apps
      - ./airflow/metadata:/opt/airflow/metadata
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
    entrypoint: >
      bash -c "
        airflow db migrate &&
        if ! airflow users list | grep -q admin; then
          airflow users create \
            --username admin --password admin \
            --firstname admin --lastname admin \
            --role Admin --email admin@example.com;
        fi
      "
    networks:
      - hive-networking

  airflow-webserver:
    build:
      context: ./airflow
      dockerfile: Dockerfile
    container_name: airflow-webserver
    depends_on:
      - airflow-init
    environment:
      <<: *airflow-env
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/maestro:/opt/airflow/maestro
      - ./airflow/apps:/opt/airflow/apps
      - ./airflow/metadata:/opt/airflow/metadata
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
    ports:
      - "8081:8080"
    command: webserver
    networks:
      - hive-networking

  airflow-scheduler:
    build:
      context: ./airflow
      dockerfile: Dockerfile
    container_name: airflow-scheduler
    depends_on:
      - airflow-webserver
    environment:
      <<: *airflow-env
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/maestro:/opt/airflow/maestro
      - ./airflow/apps:/opt/airflow/apps
      - ./airflow/metadata:/opt/airflow/metadata
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
    command: scheduler
    networks:
      - hive-networking

  airflow-triggerer:
    build:
      context: ./airflow
      dockerfile: Dockerfile
    container_name: airflow-triggerer
    depends_on:
      - airflow-scheduler
    environment:
      <<: *airflow-env
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/maestro:/opt/airflow/maestro
      - ./airflow/apps:/opt/airflow/apps
      - ./airflow/metadata:/opt/airflow/metadata
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
    command: triggerer
    networks:
      - hive-networking

  # OpenMetadata services
  openmetadata-elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.21
    container_name: openmetadata-elasticsearch
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    networks:
      - hive-networking
    volumes:
      - openmetadata_elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # OpenMetadata requires MySQL (not PostgreSQL) — the server image uses the MySQL JDBC driver
  openmetadata-mysql:
    image: mysql:8.0
    container_name: openmetadata-mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_USER: openmetadata_user
      MYSQL_PASSWORD: openmetadata_password
      MYSQL_DATABASE: openmetadata_db
    volumes:
      - openmetadata_mysql_data:/var/lib/mysql
    networks:
      - hive-networking
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ppassword"]
      interval: 15s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  # Runs DB schema migrations before the server starts (one-shot, exits 0 on success)
  openmetadata-migrate:
    image: openmetadata/server:1.3.0
    container_name: openmetadata-migrate
    depends_on:
      openmetadata-mysql:
        condition: service_healthy
    environment:
      DB_DRIVER_CLASS: com.mysql.cj.jdbc.Driver
      DB_SCHEME: mysql
      DB_USE_SSL: "false"
      DB_USER: openmetadata_user
      DB_USER_PASSWORD: openmetadata_password
      DB_HOST: openmetadata-mysql
      DB_PORT: 3306
      OM_DATABASE: openmetadata_db
    command: ["//opt/openmetadata/bootstrap/openmetadata-ops.sh", "migrate"]
    networks:
      - hive-networking
    restart: "no"

  openmetadata:
    image: openmetadata/server:1.3.0
    container_name: openmetadata
    depends_on:
      openmetadata-migrate:
        condition: service_completed_successfully
      openmetadata-elasticsearch:
        condition: service_healthy
    environment:
      # Database (MySQL)
      DB_DRIVER_CLASS: com.mysql.cj.jdbc.Driver
      DB_SCHEME: mysql
      DB_USE_SSL: "false"
      DB_USER: openmetadata_user
      DB_USER_PASSWORD: openmetadata_password
      DB_HOST: openmetadata-mysql
      DB_PORT: 3306
      OM_DATABASE: openmetadata_db
      # Elasticsearch
      ELASTICSEARCH_HOST: openmetadata-elasticsearch
      ELASTICSEARCH_PORT: "9200"
      ELASTICSEARCH_SCHEME: http
      # Airflow pipeline service
      AIRFLOW_HOST: http://airflow-webserver:8080
      SERVER_HOST_API_URL: http://openmetadata:8585/api
      AIRFLOW_AUTH_PROVIDER: "basic"
      OM_AUTH_AIRFLOW_USERNAME: admin
      OM_AUTH_AIRFLOW_PASSWORD: admin
    ports:
      - "8585:8585"
    networks:
      hive-networking:
        aliases:
          - openmetadata
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8585/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    restart: unless-stopped

  # ── ngrok tunnel ──────────────────────────────────────────────────────────
  # Exposes Jenkins publicly so GitHub webhooks can reach it.
  # Requires a free ngrok account — set NGROK_AUTHTOKEN in .env
  # Once running, get the public URL with:
  #   curl -s http://localhost:4040/api/tunnels | python -m json.tool
  # Use that URL as the GitHub webhook payload URL:
  #   https://<random>.ngrok-free.app/github-webhook/
  ngrok:
    image: ngrok/ngrok:latest
    container_name: ngrok
    command: http jenkins:8080
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    ports:
      - "4040:4040"     # ngrok inspection UI
    networks:
      - hive-networking
    depends_on:
      - jenkins
    restart: unless-stopped

  # ── Nexus Repository Manager ──────────────────────────────────────────────
  # Artifact store for Jenkins CI/CD pipeline.
  # First-run: retrieve the auto-generated admin password with:
  #   docker exec nexus cat /nexus-data/admin.password
  # Then log in at http://localhost:8082, complete the setup wizard, and
  # create a raw (hosted) repository named "artifacts":
  #   Repository → Repositories → Create repository → raw (hosted) → name: artifacts
  nexus:
    image: sonatype/nexus3:latest
    container_name: nexus
    ports:
      - "8082:8081"       # Nexus UI + REST API  (8081 is taken by airflow-webserver)
      - "5001:5001"       # Docker hosted registry (enable in Nexus UI if needed)
    volumes:
      - nexus_data:/nexus-data
    networks:
      hive-networking:
        aliases:
          - nexus
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/service/rest/v1/status"]   # internal port
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s   # Nexus takes ~2 min on first boot

  # ── Jenkins CI/CD ─────────────────────────────────────────────────────────
  # First-run: retrieve the unlock password with:
  #   docker exec jenkins cat /var/jenkins_home/secrets/initialAdminPassword
  # Then log in at http://localhost:8090 and complete the setup wizard.
  # Mount the host Docker socket so Jenkins can build & tag Docker images.
  jenkins:
    image: jenkins/jenkins:lts
    container_name: jenkins
    user: root
    ports:
      - "8090:8080"     # Jenkins UI
      - "50000:50000"   # Jenkins agent (JNLP) port
    volumes:
      - jenkins_data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock   # Docker-in-Docker via socket
    networks:
      hive-networking:
        aliases:
          - jenkins
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/login"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  #add dremio service
