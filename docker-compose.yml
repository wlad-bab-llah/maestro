  # # add dbeaver service
  # dbeaver:
  #   image: dbeaver/cloudbeaver:latest
  #   container_name: dbeaver
  #   ports:
  #     - "8978:8978"  # DBeaver Web UI
  #   environment:
  #     - CB_ADMIN_NAME=admin
